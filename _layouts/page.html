---
layout: default
---

<!-- Page hero banner -->
<header class="page-hero"{% if page.banner_image %} style="background-image: url('{{ page.banner_image | prepend: site.baseurl }}')"{% endif %}>
  <div class="page-hero__overlay"></div>
  <div class="page-hero__content container">
    <h1>{{ page.title }}</h1>
    {% if page.tagline %}<p class="hero-tagline">{{ page.tagline }}</p>{% endif %}
  </div>
</header>

<!-- Page content -->
<div class="page-body">
  <div class="container">
    {{ content }}
  </div>
</div>
