<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% if page.title %}{{ page.title }} | {{ site.title }}{% else %}{{ site.title }} — {{ site.tagline }}{% endif %}</title>
<meta name="description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description | strip_html | truncate: 160 }}{% endif %}">

<!-- Canonical URL -->
<link rel="canonical" href="{{ page.url | prepend: site.url }}">

<!-- Stylesheet -->
<link rel="stylesheet" href="{{ '/assets/css/main.css' | prepend: site.baseurl }}">

<!-- SEO -->
{% seo %}

<!-- Favicon placeholder — replace /assets/images/favicon.ico with your own -->
<link rel="icon" type="image/x-icon" href="{{ '/assets/images/favicon.ico' | prepend: site.baseurl }}">
