<nav class="site-nav" id="site-nav" role="navigation" aria-label="Main navigation">
  <div class="site-nav__inner">

    <!-- Lab name / brand -->
    <a href="{{ '/' | prepend: site.baseurl }}" class="nav-brand" aria-label="{{ site.title }} home">
      <span class="nav-brand__name">Terry Lab</span>
      <span class="nav-brand__sub">Oregon State University</span>
    </a>

    <!-- Mobile hamburger button -->
    <button class="nav-toggle" id="nav-toggle"
            aria-controls="nav-links"
            aria-expanded="false"
            aria-label="Toggle navigation menu">
      <span></span>
      <span></span>
      <span></span>
    </button>

    <!-- Navigation links -->
    <ul class="nav-links" id="nav-links" role="list">
      {% for item in site.navigation %}
      <li>
        <a href="{{ item.url | prepend: site.baseurl }}"
           {% if page.url == item.url %}class="active" aria-current="page"{% endif %}>
          {{ item.title }}
        </a>
      </li>
      {% endfor %}
    </ul>

  </div>
</nav>
