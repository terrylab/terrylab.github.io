<footer class="site-footer" role="contentinfo">
  <div class="site-footer__inner container">

    <div class="site-footer__brand">
      <strong>Terry Lab</strong><br>
      Department of Integrative Biology<br>
      Oregon State University<br>
      Corvallis, OR 97331
    </div>

    <div class="site-footer__contact">
      <strong>Contact</strong><br>
      <a href="mailto:{{ site.email }}">{{ site.email }}</a><br>
      541-737-3723
    </div>

    <div class="site-footer__links">
      <strong>Navigate</strong>
      <ul>
        {% for item in site.navigation %}
        <li><a href="{{ item.url | prepend: site.baseurl }}">{{ item.title }}</a></li>
        {% endfor %}
      </ul>
    </div>

  </div>

  <div class="site-footer__bottom">
    <div class="container">
      &copy; Terry Lab. {{ 'now' | date: "%Y" }}. All rights reserved.
    </div>
  </div>
</footer>

<style>
/* Footer styles inline here to keep _sass clean */
.site-footer {
  background: #1e1610;
  color: rgba(240, 230, 211, 0.75);
  padding: 3rem 0 0;
  margin-top: auto;
  font-size: 0.875rem;
  line-height: 1.7;
}

.site-footer__inner {
  display: grid;
  grid-template-columns: 2fr 1fr 1fr;
  gap: 2rem 3rem;
  padding-bottom: 3rem;
}

.site-footer strong {
  color: rgba(240, 230, 211, 0.95);
  font-weight: 700;
  display: block;
  margin-bottom: 0.5rem;
}

.site-footer a {
  color: rgba(240, 230, 211, 0.65);
  text-decoration: none;
}
.site-footer a:hover {
  color: rgba(240, 230, 211, 1);
}

.site-footer__links ul {
  list-style: none;
  padding: 0;
  margin: 0;
}
.site-footer__links li { margin-bottom: 0.3rem; }

.site-footer__bottom {
  border-top: 1px solid rgba(255,255,255,0.08);
  padding: 1rem 0;
  font-size: 0.8rem;
  color: rgba(240, 230, 211, 0.4);
}

@media (max-width: 640px) {
  .site-footer__inner {
    grid-template-columns: 1fr 1fr;
  }
  .site-footer__brand {
    grid-column: 1 / -1;
  }
}
</style>
